<svg xmlns="http://www.w3.org/2000/svg" width="224" height="224" viewBox="0 0 224 224">
  <defs>
    <clipPath id="circle"><circle cx="112" cy="112" r="112"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="224" height="224" fill="url(#bg)"/>
    <!-- shoulders -->
    <ellipse cx="112" cy="230" rx="80" ry="60" fill="#333"/>
    <!-- neck -->
    <rect x="96" y="150" width="32" height="30" rx="4" fill="#c4a882"/>
    <!-- head -->
    <ellipse cx="112" cy="110" rx="42" ry="52" fill="#c4a882"/>
    <!-- hair -->
    <ellipse cx="112" cy="80" rx="46" ry="40" fill="#3a2218"/>
    <ellipse cx="82" cy="100" rx="16" ry="35" fill="#3a2218"/>
    <ellipse cx="142" cy="100" rx="16" ry="35" fill="#3a2218"/>
    <!-- eyes -->
    <ellipse cx="98" cy="112" rx="5" ry="3.5" fill="#2c1810"/>
    <ellipse cx="126" cy="112" rx="5" ry="3.5" fill="#2c1810"/>
    <!-- smile -->
    <path d="M100,128 Q112,138 124,128" stroke="#a08060" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- subtle ring -->
  <circle cx="112" cy="112" r="110" fill="none" stroke="rgba(226,52,29,0.3)" stroke-width="3"/>
</svg>
